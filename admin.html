<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Zacharias Polonius</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.6/dist/quill.snow.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg:        #0f0f0f;
      --bg-card:   #161616;
      --bg-input:  #111111;
      --border:    rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.12);
      --text:      #e8e8e8;
      --muted:     rgba(255,255,255,0.45);
      --faint:     rgba(255,255,255,0.2);
      --ghost:     rgba(255,255,255,0.08);
      --blue:      #418FFF;
      --green:     #41A447;
      --red:       #e05555;
      --amber:     #e09a30;
      --sidebar-w: 220px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:13px; overflow:hidden; }

    /* ---- LOGIN ---- */
    #loginScreen {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center; z-index:999;
    }
    .login-box {
      width:100%; max-width:360px; padding:40px;
      border:0.5px solid var(--border-md);
      background:var(--bg-card);
    }
    .login-logo { font-size:16px; font-weight:700; letter-spacing:-0.03em; color:#fff; margin-bottom:6px; }
    .login-logo span { color:var(--blue); }
    .login-sub  { font-size:11px; color:var(--faint); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:32px; }
    .login-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); margin-bottom:6px; display:block; }
    .login-input {
      width:100%; background:var(--bg-input); border:0.5px solid var(--border);
      color:#fff; font-size:13px; font-family:'Inter',sans-serif;
      padding:10px 14px; outline:none; margin-bottom:14px;
      transition:border-color 0.2s;
    }
    .login-input:focus { border-color:var(--blue); }
    .login-btn {
      width:100%; background:var(--blue); color:#fff; border:none;
      padding:11px; font-size:13px; font-weight:500; cursor:pointer;
      font-family:'Inter',sans-serif; transition:opacity 0.2s; margin-top:4px;
    }
    .login-btn:hover { opacity:0.85; }
    .login-error { font-size:12px; color:var(--red); margin-top:10px; display:none; }

    /* ---- LAYOUT ---- */
    #adminApp { display:none; height:100%; flex-direction:row; }
    #adminApp.show { display:flex; }

    /* ---- SIDEBAR ---- */
    .sidebar {
      width:var(--sidebar-w); flex-shrink:0;
      background:var(--bg-card); border-right:0.5px solid var(--border);
      display:flex; flex-direction:column; overflow-y:auto;
    }
    .sidebar-logo {
      padding:20px; border-bottom:0.5px solid var(--border);
      font-size:14px; font-weight:700; letter-spacing:-0.03em; color:#fff;
    }
    .sidebar-logo span { color:var(--blue); }
    .sidebar-logo small { display:block; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--faint); font-weight:400; margin-top:2px; }

    .sidebar-section { padding:16px 0 8px; }
    .sidebar-section-label {
      font-size:9px; letter-spacing:0.14em; text-transform:uppercase;
      color:var(--faint); padding:0 16px 8px;
    }
    .sidebar-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 16px; cursor:pointer; transition:background 0.15s;
      color:var(--muted); font-size:12px; border:none; background:transparent;
      width:100%; text-align:left; font-family:'Inter',sans-serif;
    }
    .sidebar-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
    .sidebar-item.active { background:rgba(65,143,255,0.1); color:var(--blue); }
    .sidebar-item .icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
    .sidebar-item .badge {
      margin-left:auto; font-size:9px; background:var(--ghost);
      color:var(--faint); padding:2px 6px; border-radius:20px;
    }
    .sidebar-item.active .badge { background:rgba(65,143,255,0.2); color:var(--blue); }

    .sidebar-footer {
      margin-top:auto; padding:14px 16px;
      border-top:0.5px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .sidebar-view-btn {
      font-size:11px; color:var(--faint); background:transparent;
      border:0.5px solid var(--border); padding:5px 10px; cursor:pointer;
      font-family:'Inter',sans-serif; transition:all 0.2s;
    }
    .sidebar-view-btn:hover { color:var(--blue); border-color:var(--blue); }
    .logout-btn {
      font-size:11px; color:var(--faint); background:transparent;
      border:none; cursor:pointer; font-family:'Inter',sans-serif; transition:color 0.2s;
    }
    .logout-btn:hover { color:var(--red); }

    /* ---- MAIN ---- */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 32px; height:56px; border-bottom:0.5px solid var(--border);
      flex-shrink:0;
    }
    .topbar-title { font-size:14px; font-weight:600; color:#fff; letter-spacing:-0.02em; }
    .topbar-sub { font-size:11px; color:var(--faint); margin-top:1px; }
    .topbar-actions { display:flex; gap:10px; align-items:center; }
    .btn-add {
      background:var(--blue); color:#fff; border:none;
      padding:7px 16px; font-size:12px; font-weight:500;
      cursor:pointer; font-family:'Inter',sans-serif; transition:opacity 0.2s;
    }
    .btn-add:hover { opacity:0.85; }
    .btn-save {
      background:var(--green); color:#fff; border:none;
      padding:7px 16px; font-size:12px; font-weight:500;
      cursor:pointer; font-family:'Inter',sans-serif; transition:opacity 0.2s; display:none;
    }
    .btn-save:hover { opacity:0.85; }
    .save-status { font-size:11px; color:var(--faint); display:none; }

    /* ---- CONTENT AREA ---- */
    .content-area { flex:1; overflow-y:auto; padding:28px 32px; }

    /* ---- CARDS / GRID ---- */
    .entry-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
    .entry-card {
      background:var(--bg-card); border:0.5px solid var(--border);
      padding:18px 20px; transition:border-color 0.2s;
    }
    .entry-card:hover { border-color:var(--border-md); }
    .entry-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .entry-card-tag {
      font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
      padding:2px 7px; border:0.5px solid var(--border-md); color:var(--faint);
    }
    .entry-card-tag.ai    { border-color:rgba(65,143,255,0.4); color:var(--blue); }
    .entry-card-tag.work  { border-color:rgba(65,164,71,0.4);  color:var(--green); }
    .entry-card-tag.checkout { border-color:rgba(65,143,255,0.4); color:var(--blue); }
    .entry-card-tag.volunteer { border-color:var(--border-md); color:var(--faint); }
    .entry-card-tag.education { border-color:var(--border-md); color:var(--muted); }
    .entry-card-actions { display:flex; gap:6px; }
    .btn-edit, .btn-del {
      background:transparent; border:0.5px solid var(--border);
      font-size:10px; padding:3px 8px; cursor:pointer;
      font-family:'Inter',sans-serif; transition:all 0.2s;
    }
    .btn-edit { color:var(--muted); }
    .btn-edit:hover { border-color:var(--blue); color:var(--blue); }
    .btn-del { color:var(--faint); }
    .btn-del:hover { border-color:var(--red); color:var(--red); }
    .entry-card-title { font-size:13px; font-weight:600; color:#fff; margin-bottom:4px; letter-spacing:-0.01em; }
    .entry-card-sub { font-size:11px; color:var(--muted); margin-bottom:8px; }
    .entry-card-desc { font-size:11px; color:var(--faint); line-height:1.6; }
    .entry-card-period { font-size:10px; color:var(--blue); letter-spacing:0.06em; margin-top:10px; }

    /* ---- FORM PANEL (CENTERED 2-COLUMN) ---- */
    .form-panel {
      display:none; position:fixed;
      top: 4vh; left: 50%; transform: translateX(-50%);
      width: 92vw; max-width: 1000px; height: 92vh;
      background:var(--bg-card); border:0.5px solid var(--border-md);
      z-index:105; flex-direction:column;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      border-radius: 6px;
    }
    .form-panel.open { display:flex; }
    .form-panel-header {
      padding:20px 32px; border-bottom:0.5px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .form-panel-title { font-size:16px; font-weight:600; color:#fff; letter-spacing:-0.02em; }
    .form-panel-close {
      background:transparent; border:0.5px solid var(--border);
      color:var(--muted); width:32px; height:32px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:16px; transition:all 0.2s; border-radius: 4px;
    }
    .form-panel-close:hover { border-color:var(--red); color:var(--red); }
    .form-panel-body { flex:1; overflow-y:auto; padding:32px; }
    
    .form-layout { display: grid; grid-template-columns: 1fr 300px; gap: 40px; }
    .form-main { display: flex; flex-direction: column; gap: 18px; }
    .form-sidebar { display: flex; flex-direction: column; gap: 18px; border-left: 0.5px solid var(--border); padding-left: 32px; }
    @media (max-width: 800px) {
      .form-layout { grid-template-columns: 1fr; }
      .form-sidebar { border-left: none; padding-left: 0; border-top: 0.5px solid var(--border); padding-top: 24px; }
    }
    
    .form-panel-footer {
      padding:20px 32px; border-top:0.5px solid var(--border);
      display:flex; justify-content:flex-end; gap:12px; flex-shrink:0; background: var(--bg-card);
      border-bottom-left-radius: 6px; border-bottom-right-radius: 6px;
    }
    .btn-submit {
      background:var(--blue); color:#fff; border:none;
      padding:10px 24px; font-size:13px; font-weight:500;
      cursor:pointer; font-family:'Inter',sans-serif;
      transition:opacity 0.2s; border-radius: 4px;
    }
    .btn-submit:hover { opacity:0.85; }

    .btn-ai {
      background: linear-gradient(135deg, #418FFF, #9b51e0);
      color: white; border: none; padding: 5px 12px; font-size: 10px; font-weight: 600;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; box-shadow: 0 4px 12px rgba(65, 143, 255, 0.2);
      font-family: 'Inter', sans-serif;
    }
    .btn-ai:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(65, 143, 255, 0.3); }
    .btn-ai:active { transform: translateY(0); }
    .btn-ai:disabled { background: var(--border-md); cursor: not-allowed; opacity: 0.6; }

    /* ---- AI DRAFT MODAL ---- */
    .ai-modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
      z-index:200; align-items:center; justify-content:center; padding:20px;
      backdrop-filter: blur(4px);
    }
    .ai-modal.show { display:flex; }
    .ai-box {
      width:100%; max-width:800px; background:var(--bg-card);
      border:0.5px solid var(--border-md); box-shadow:0 30px 90px rgba(0,0,0,0.8);
      display:flex; flex-direction:column; max-height:90vh; border-radius: 8px;
    }
    .ai-header { padding:20px 24px; border-bottom:0.5px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .ai-title { font-size:14px; font-weight:600; color:#fff; display:flex; align-items:center; gap:8px; }
    .ai-body { flex:1; overflow-y:auto; padding:24px; }
    .ai-preview {
      background:var(--bg-input); border:0.5px solid var(--border); padding:24px;
      border-radius:4px; font-size:14px; line-height:1.7; color:var(--muted);
      min-height:200px; position:relative;
    }
    .ai-preview.loading { opacity: 0.5; pointer-events: none; }
    .ai-preview.loading::after {
      content: 'AI genererer tekst...';
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 12px; color: var(--blue); font-weight: 500;
      animation: aiPulse 1.5s ease-in-out infinite;
    }
    @keyframes aiPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .ai-feedback-wrap { padding:16px 24px; border-top:0.5px solid var(--border); background:rgba(255,255,255,0.02); }
    .ai-feedback-input {
      width:100%; background:var(--bg-input); border:0.5px solid var(--border-md);
      color:#fff; padding:10px 14px; font-size:12px; border-radius:4px; outline:none;
      font-family: inherit; margin-bottom: 12px;
    }
    .ai-feedback-input:focus { border-color: var(--blue); }
    .ai-footer { padding:20px 24px; border-top:0.5px solid var(--border); display:flex; justify-content:flex-end; gap:12px; }

    /* ---- QUILL OVERRIDES ---- */
    .ql-toolbar.ql-snow { border: 0.5px solid var(--border-md) !important; background: var(--bg-card); border-top-left-radius: 4px; border-top-right-radius: 4px; padding: 12px !important; }
    .ql-container.ql-snow { border: 0.5px solid var(--border-md) !important; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; font-family: 'Inter', sans-serif !important; font-size: 14px !important; background: var(--bg-input); color: var(--text) !important; min-height: 250px; }
    .ql-snow .ql-stroke { stroke: var(--muted) !important; }
    .ql-snow .ql-fill { fill: var(--muted) !important; }
    .ql-snow .ql-picker { color: var(--muted) !important; }
    .ql-editor { min-height: 250px; line-height: 1.6 !important; }
    .ql-editor strong { font-weight: 700; color: #fff; }
    .ql-editor h2, .ql-editor h3 { color: #fff; border:none; margin-top: 15px; margin-bottom: 10px; }
    .ql-snow.ql-toolbar button:hover .ql-stroke, .ql-snow .ql-toolbar button:hover .ql-stroke { stroke: var(--blue) !important; }
    .ql-snow .ql-active .ql-stroke { stroke: var(--blue) !important; }

    .btn-cancel {
      background:transparent; color:var(--muted); border:0.5px solid var(--border);
      padding:10px 20px; font-size:13px; cursor:pointer;
      font-family:'Inter',sans-serif; transition:all 0.2s; border-radius: 4px;
    }
    .btn-cancel:hover { border-color:var(--border-md); color:var(--text); }

    /* ---- FORM FIELDS ---- */
    .field { margin-bottom:18px; }
    .field-label {
      display:block; font-size:10px; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--faint); margin-bottom:6px;
    }
    .field-hint { font-size:10px; color:var(--faint); margin-top:4px; }
    .f-input, .f-select, .f-textarea {
      width:100%; background:var(--bg-input); border:0.5px solid var(--border);
      color:#fff; font-size:12px; font-family:'Inter',sans-serif;
      padding:9px 12px; outline:none; transition:border-color 0.2s;
      -webkit-appearance:none; border-radius:0;
    }
    .f-input:focus, .f-select:focus, .f-textarea:focus { border-color:var(--blue); }
    .f-select option { background:#1a1a1a; }
    .f-textarea { resize:vertical; min-height:90px; line-height:1.6; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ---- SETTINGS SECTIONS ---- */
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .settings-card { background:var(--bg-card); border:0.5px solid var(--border); padding:20px 22px; }
    .settings-card-title { font-size:12px; font-weight:600; color:#fff; margin-bottom:14px; letter-spacing:-0.01em; }

    /* ---- HERO EDITOR ---- */
    .hero-preview {
      background:var(--ghost); border:0.5px solid var(--border);
      padding:24px; margin-bottom:20px;
    }
    .hero-preview-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); margin-bottom:10px; }
    .hero-preview-name { font-size:28px; font-weight:700; letter-spacing:-0.04em; color:#fff; line-height:1.1; }
    .hero-preview-role { font-size:13px; color:var(--blue); margin-top:6px; }
    .hero-preview-tag  { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.6; }

    /* ---- SPECIALER ---- */
    .special-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
    .special-card {
      background:var(--bg-card); border:0.5px solid var(--border);
      padding:16px 18px; display:flex; align-items:flex-start; gap:12px;
    }
    .special-icon { font-size:18px; color:var(--blue); flex-shrink:0; }
    .special-info { flex:1; }
    .special-title { font-size:12px; font-weight:600; color:#fff; margin-bottom:4px; }
    .special-desc  { font-size:11px; color:var(--faint); line-height:1.6; }
    .special-actions { display:flex; gap:6px; margin-top:10px; }

    /* ---- BENTO EDITOR ---- */
    .bento-list { display:flex; flex-direction:column; gap:8px; }
    .bento-row {
      display:grid; grid-template-columns:24px 1fr 1fr auto;
      align-items:center; gap:10px;
      background:var(--bg-card); border:0.5px solid var(--border);
      padding:12px 14px;
    }
    .bento-handle { color:var(--faint); cursor:grab; font-size:14px; text-align:center; }
    .bento-label-val { }
    .bento-label-txt { font-size:10px; color:var(--faint); letter-spacing:0.1em; text-transform:uppercase; }
    .bento-main-txt { font-size:13px; font-weight:600; color:#fff; }
    .bento-sub-txt  { font-size:11px; color:var(--muted); }

    /* ---- QUOTE LIST ---- */
    .quote-list { display:flex; flex-direction:column; gap:10px; }
    .quote-row {
      background:var(--bg-card); border:0.5px solid var(--border);
      padding:16px 18px;
    }
    .quote-row-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .quote-name { font-size:12px; font-weight:600; color:#fff; }
    .quote-role-txt { font-size:11px; color:var(--faint); }
    .quote-text-preview { font-size:12px; color:var(--muted); line-height:1.6; font-style:italic; }

    /* ---- TOAST ---- */
    .toast {
      position:fixed; bottom:24px; right:24px;
      background:var(--bg-card); border:0.5px solid var(--green);
      color:var(--text); padding:12px 20px; font-size:12px;
      display:none; align-items:center; gap:8px; z-index:500;
      animation:slideIn 0.3s ease;
    }
    .toast.show { display:flex; }
    .toast.error { border-color:var(--red); }
    .toast-dot { width:6px; height:6px; background:var(--green); border-radius:50%; flex-shrink:0; }
    .toast.error .toast-dot { background:var(--red); }
    @keyframes slideIn { from { transform:translateY(10px); opacity:0; } to { transform:translateY(0); opacity:1; } }

    /* ---- EMPTY STATE ---- */
    .empty { text-align:center; padding:60px 20px; color:var(--faint); }
    .empty-icon { font-size:32px; margin-bottom:14px; opacity:0.4; }
    .empty h3 { font-size:14px; color:var(--muted); margin-bottom:6px; }
    .empty p  { font-size:12px; line-height:1.6; }

    /* ---- COLOR PICKER ---- */
    .color-row { display:flex; align-items:center; gap:10px; }
    .color-swatch { width:32px; height:32px; border:0.5px solid var(--border); cursor:pointer; flex-shrink:0; }
    .color-presets { display:flex; gap:6px; margin-top:8px; }
    .color-preset { width:24px; height:24px; cursor:pointer; border:0.5px solid transparent; transition:border-color 0.2s; }
    .color-preset:hover { border-color:rgba(255,255,255,0.4); }

    /* ---- OVERLAY BACKDROP ---- */
    .panel-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      z-index:99; display:none;
    }
    .panel-backdrop.show { display:block; }


    /* ---- IMAGE UPLOAD ---- */
    .upload-zone {
      border: 0.5px dashed var(--border-md);
      padding: 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; background: var(--bg-input); position: relative;
    }
    .upload-zone:hover { border-color: var(--blue); background: rgba(65,143,255,0.04); }
    .upload-zone.dragover { border-color: var(--blue); background: rgba(65,143,255,0.08); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .upload-zone-icon { font-size: 22px; margin-bottom: 8px; opacity: 0.4; }
    .upload-zone-text { font-size: 12px; color: var(--muted); }
    .upload-zone-hint { font-size: 10px; color: var(--faint); margin-top: 4px; }
    .upload-preview { margin-top: 10px; border: 0.5px solid var(--border); padding: 10px; display: none; align-items: center; gap: 12px; background: var(--bg-input); }
    .upload-preview.show { display: flex; }
    .upload-preview img { width: 48px; height: 48px; object-fit: cover; object-position: center; flex-shrink: 0; border: 0.5px solid var(--border); }
    .upload-preview-name { font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .upload-preview-path { font-size: 10px; color: var(--blue); font-family: monospace; }
    .upload-preview-clear { background: transparent; border: 0.5px solid var(--border); color: var(--faint); padding: 4px 8px; font-size: 10px; cursor: pointer; font-family: var(--font); transition: all 0.2s; flex-shrink: 0; }
    .upload-preview-clear:hover { border-color: var(--red); color: var(--red); }

    /* ---- FOCUS PICKER ---- */
    .focus-picker-wrap { margin-top: 10px; }
    .focus-picker-label { font-size: 11px; color: var(--text-faint); margin-bottom: 6px; display: block; }
    .focus-picker-container { 
      position: relative; width: 100%; max-width: 200px; aspect-ratio: 16/9; 
      background: var(--bg-input); border: 0.5px solid var(--border); 
      cursor: crosshair; overflow: hidden; 
    }
    .focus-picker-img { width: 100%; height: 100%; object-fit: contain; opacity: 0.8; }
    .focus-picker-dot { 
      position: absolute; width: 14px; height: 14px; 
      border: 2px solid #fff; border-radius: 50%; 
      background: var(--blue); box-shadow: 0 0 10px rgba(0,0,0,0.5); 
      transform: translate(-50%, -50%); pointer-events: none; 
      transition: all 0.1s ease-out;
    }
    .focus-picker-dot::after {
      content: ''; position: absolute; top: 50%; left: 50%; 
      width: 30px; height: 30px; border: 0.5px solid rgba(255,255,255,0.3); 
      border-radius: 50%; transform: translate(-50%, -50%);
    }

    .upload-progress { height: 2px; background: var(--border); margin-top: 8px; display: none; }
    .upload-progress-bar { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }
    .upload-error { font-size: 11px; color: var(--red); margin-top: 6px; display: none; }
    /* ---- CONFIRM DIALOG ---- */
    .confirm-dialog {
      position:fixed; inset:0; z-index:200;
      display:none; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.7);
    }
    .confirm-dialog.show { display:flex; }
    .confirm-box {
      background:var(--bg-card); border:0.5px solid var(--border-md);
      padding:28px 32px; max-width:340px; width:100%; margin:20px;
    }
    .confirm-title { font-size:14px; font-weight:600; color:#fff; margin-bottom:8px; }
    .confirm-text  { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:20px; }
    .confirm-actions { display:flex; gap:10px; }
    .btn-confirm-del {
      background:var(--red); color:#fff; border:none;
      padding:8px 18px; font-size:12px; font-weight:500;
      cursor:pointer; font-family:'Inter',sans-serif; flex:1;
    }
    .btn-confirm-cancel {
      background:transparent; color:var(--muted); border:0.5px solid var(--border);
      padding:8px 14px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif;
    }
  </style>
</head>
<body>

      <div style="display:flex; justify-content:space-between; align-items:center; gap:16px;">

<script src="https://cdn.jsdelivr.net/npm/quill@1.3.6/dist/quill.min.js"></script>
<script>
/* ============================================================
   ADMIN PANEL — ZACHARIAS POLONIUS
   Password: sættes i api/config.php på serveren

   ============================================================ */
  let data = {};
  let currentSection = 'forside';
  let editingId = null;
  let deleteTarget = null;
  let quillEditor = null;

  /* ---- UTILS ---- */
  function stripHtml(html) {
    if (!html) return '';
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent || div.innerText || "";
  }

  /* ---- AI OPTIMIZATION ---- */
  let lastAIContext = '';
  let lastOptimizedHTML = '';

  async function optimizeWithAI(context, instruction = '') {
    lastAIContext = context;
    let textToOptimize = '';
    
    // Tjek Quill
    if (typeof Quill !== 'undefined' && quillEditor && quillEditor.getText) {
      textToOptimize = quillEditor.getText();
    } 
    // Fallback til legacy/textarea
    if (!textToOptimize || textToOptimize.trim().length < 5) {
      const legacy = document.getElementById('legacyEditor');
      if (legacy) textToOptimize = legacy.value;
    }

    if (!textToOptimize || textToOptimize.trim().length < 5) {
      showToast('Skriv venligst lidt mere tekst før optimering', true);
      return;
    }

    if (!document.getElementById('aiModal').classList.contains('show')) openAIModal();
    setAILoading(true);

    try {
      // Brug model fra modalen hvis den er åben, ellers site-indstilling
      const modalModel = document.getElementById('modalAIModel').value;
      const aiModel = modalModel || data.site?.ai_model || 'gemini-1.5-flash';

      const response = await fetch('api/optimize.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({
          text: textToOptimize,
          context: context,
          instruction: instruction,
          model: aiModel
        })
      });

      const res = await response.json();
      if (res.ok) {
        lastOptimizedHTML = res.optimized;
        document.getElementById('aiPreview').innerHTML = res.optimized;
        // Opdater også dropdown hvis vi lige har brugt en anden model
        if (res.model_used) document.getElementById('modalAIModel').value = res.model_used;
      } else {
        showToast('AI Fejl: ' + res.error, true);
        document.getElementById('aiPreview').innerHTML = `<div style="color:var(--red);padding:20px;text-align:center;"><strong>AI-tjenesten svarede med en fejl:</strong><br>${res.error}<br><br><small>Prøv eventuelt at skifte model nedenfor.</small></div>`;
      }
      } catch (err) {
      showToast('Kunne ikke forbinde til AI-tjenesten', true);
      document.getElementById('aiPreview').innerHTML = `<div style="color:var(--red);padding:20px;text-align:center;"><strong>Forbindelsesfejl</strong><br>Der kunne ikke oprettes forbindelse til AI-serveren (fejl 503 eller netværk).<br><br><small>Prøv en anden model eller vent et øjeblik.</small></div>`;
      } finally {
      setAILoading(false);
      }    }

    function openAIModal() {
    document.getElementById('aiModal').classList.add('show');
    document.getElementById('aiFeedback').value = '';
    document.getElementById('aiPreview').innerHTML = '';

    // Hent modeller til modalen
    fetch('api/models.php', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          const sel = document.getElementById('modalAIModel');
          const current = data.site?.ai_model || 'gemini-1.5-flash';
          sel.innerHTML = res.models.map(m => `<option value="${m.id}" ${m.id===current?'selected':''}>${m.name}</option>`).join('');
        }
      });
    }
  function closeAIModal() {
    document.getElementById('aiModal').classList.remove('show');
  }

  function setAILoading(isLoading) {
    const p = document.getElementById('aiPreview');
    const b = document.getElementById('btnAIRetry');
    if (p) p.classList.toggle('loading', isLoading);
    if (b) b.disabled = isLoading;
  }

  function retryAI() {
    const feedback = document.getElementById('aiFeedback').value;
    optimizeWithAI(lastAIContext, feedback);
  }

  function insertAIResult() {
    if (lastOptimizedHTML) {
      if (typeof Quill !== 'undefined' && quillEditor && quillEditor.clipboard) {
        quillEditor.clipboard.dangerouslyPasteHTML(lastOptimizedHTML);
        showToast('Tekst opdateret!');
      } else {
        const legacy = document.getElementById('legacyEditor');
        if (legacy) {
          legacy.value = stripHtml(lastOptimizedHTML);
          showToast('Tekst opdateret (uden formatering)!');
        }
      }
      // Auto-gem efter AI-indsættelse
      setTimeout(saveAll, 300);
    }
    closeAIModal();
  }

  function initQuill(selector, content) {
    const container = document.querySelector(selector);
    if (!container) return;
    
    if (typeof Quill === 'undefined') {
      console.warn('Quill library not loaded. Falling back to textarea.');
      container.innerHTML = `<textarea id="legacyEditor" style="width:100%;height:300px;background:var(--bg-input);color:var(--text);border:0.5px solid var(--border-md);padding:12px;font-family:inherit;font-size:14px;outline:none;">${content}</textarea>`;
      return;
    }

    quillEditor = new Quill(selector, {
      theme: 'snow',
      placeholder: 'Skriv din tekst her...',
      modules: {
        toolbar: [
          [{ 'header': [2, 3, false] }],
          ['bold', 'italic', 'underline'],
          [{ 'align': [] }],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          ['link', 'clean']
        ]
      }
    });
    if (content) quillEditor.clipboard.dangerouslyPasteHTML(content);
  }

/* ---- LOGIN — validering sker server-side i api/login.php ---- */
function doLogin() {
  const pw  = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');
  const btn = document.querySelector('.login-btn');

  if (!pw) return;
  btn.textContent = 'Logger ind...';
  btn.disabled = true;

  fetch('api/login.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ password: pw })
  })
  .then(r => r.json())
  .then(res => {
    btn.textContent = 'Log ind';
    btn.disabled = false;
    if (res.ok) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminApp').classList.add('show');
      loadData();
    } else {
      err.textContent = res.error || 'Forkert password. Prøv igen.';
      err.style.display = 'block';
      document.getElementById('loginPw').value = '';
    }
  })
  .catch(() => {
    btn.textContent = 'Log ind';
    btn.disabled = false;
    err.textContent = 'Serverfejl — er PHP aktiv på serveren?';
    err.style.display = 'block';
  });
}

function logout() {
  fetch('api/logout.php', { credentials: 'same-origin' })
    .finally(() => {
      document.getElementById('adminApp').classList.remove('show');
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginPw').value = '';
    });
}

/* ---- DATA ---- */
function loadData() {
  fetch('api/load.php?t=' + Date.now(), {
    credentials: 'same-origin'
  })
    .then(r => {
      if (!r.ok) throw new Error('Kunne ikke hente data (Status: ' + r.status + ')');
      return r.json();
    })
    .then(d => {
      data = d;
      updateBadges();
      renderSection('forside');
    })
    .catch((err) => {
      console.error('Load failed:', err);
      showToast('Kunne ikke hente data fra serveren. Log ind igen.', true);
    });
}

function saveAll() {
  // SIKKERHEDS-SPÆRRE: Gem aldrig hvis data er tom eller korrupt
  if (!data || !data.site || !data.hero) {
    console.error('CRITICAL: Attempted to save empty or corrupt data object.', data);
    showToast('Fejl: Data er korrupt. Genindlæs siden.', true);
    return;
  }

  // Sikre at lister findes
  if (!data.specialer) data.specialer = [];
  if (!data.projects)  data.projects = [];
  if (!data.bento)     data.bento = [];
  if (!data.cv)        data.cv = { jobs:[], education:[], recommendations:[] };

  // Synkroniser data fra inputs i den nuværende sektion før gem
  if (currentSection === 'forside') {
    data.hero.intro  = document.getElementById('fe-intro').value;
    data.hero.role   = document.getElementById('fe-role').value;
    data.hero.status = document.getElementById('fe-status').value;
    data.hero.cover  = getUploadPath('fe-cover', data.hero.cover);
    data.hero.cover_pos = document.getElementById('fe-cover-pos').value;
  } else if (currentSection === 'om') {
    if (!data.om) data.om = {};
    data.om.bio        = document.getElementById('om-bio').value;
    data.om.photo      = getUploadPath('om-photo', data.om.photo);
    data.om.photo_pos  = document.getElementById('om-photo-pos').value;
    data.om.persontype = document.getElementById('om-type').value;
    data.om.sprog      = document.getElementById('om-sprog').value.split(',').map(s=>s.trim()).filter(Boolean);
    data.om.interesser = document.getElementById('om-int').value.split(',').map(s=>s.trim()).filter(Boolean);
  } else if (currentSection === 'kontakt') {
    if (!data.site) data.site = {};
    data.site.email = document.getElementById('kt-email').value;
    data.site.phone = document.getElementById('kt-phone').value;
    if (!data.site.social) data.site.social = {};
    data.site.social.linkedin  = document.getElementById('kt-li').value;
    data.site.social.instagram = document.getElementById('kt-ig').value;
    data.site.social.facebook  = document.getElementById('kt-fb').value;
  } else if (currentSection === 'site') {
    if (!data.site) data.site = {};
    data.site.name = document.getElementById('st-name').value;
    data.site.tagline = document.getElementById('st-tag').value;
    data.site.accent_color = document.getElementById('st-colorhex').value;
    data.site.ai_model     = document.getElementById('st-ai-model').value;
  }

  const btn = document.getElementById('btnSave');
  const status = document.getElementById('saveStatus');
  btn.textContent = 'Gemmer...';
  btn.style.opacity = '0.6';
  if (status) status.textContent = '⏳ Gemmer...';

  fetch('api/save.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    btn.textContent = 'Gem ændringer';
    btn.style.opacity = '1';
    if (res.ok) {
      showToast('Ændringer gemt!');
      if (status) {
        status.textContent = '✓ Gemt';
        status.style.color = 'var(--green)';
      }
    } else {
      showToast('Fejl: ' + res.error, true);
    }
  })
  .catch(() => {
    btn.textContent = 'Gem ændringer';
    btn.style.opacity = '1';
    showToast('Fejl — Kunne ikke oprette forbindelse til serveren', true);
  });
}

function updateBadges() {
  const s = data.specialer || [];
  const p = data.projects || [];
  const j = data.cv?.jobs || [];
  const e = data.cv?.education || [];
  const r = data.cv?.recommendations || [];

  const bS = document.getElementById('badge-specialer');
  if (bS) bS.textContent = s.length;
  const bP = document.getElementById('badge-projekter');
  if (bP) bP.textContent = p.length;
  const bJ = document.getElementById('badge-ansaettelser');
  if (bJ) bJ.textContent = j.length;
  const bE = document.getElementById('badge-uddannelse');
  if (bE) bE.textContent = e.length;
  const bR = document.getElementById('badge-anbefalinger');
  if (bR) bR.textContent = r.length;
}

/* ---- NAVIGATION ---- */
function showSection(key) {
  currentSection = key;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  const target = window.event ? window.event.currentTarget : null;
  if (target && target.classList) target.classList.add('active');
  closeForm();
  renderSection(key);
}

const sectionMeta = {
  forside:       { title:'Forside',         sub:'Rediger hero, bento-bokse og forsideindhold',   add:false, save:true  },
  specialer:     { title:'Kernekompetencer', sub:'Tilføj og rediger dine 3 primære fokusområder', add:true,  save:true  },
  projekter:     { title:'Business Cases & ROI', sub:'Tilføj, rediger og slet business cases',    add:true,  save:true  },
  ansaettelser:  { title:'Kommerciel Erfaring', sub:'Rediger din kommercielle baggrund',          add:true,  save:true  },
  uddannelse:    { title:'Uddannelse (Skjult)', sub:'Rediger uddannelse (Vises kun på fuldt CV)', add:true,  save:true  },
  anbefalinger:  { title:'Anbefalinger',    sub:'Tilføj og rediger anbefalinger fra samarbejdspartnere', add:true, save:true },
  om:            { title:'Om mig',          sub:'Rediger din biografi og personlige info',        add:false, save:true  },
  kontakt:       { title:'Kontakt & Sociale medier', sub:'Email, telefon og sociale profiler',   add:false, save:true  },
  site:          { title:'Site-indstillinger', sub:'Sitenavn, farver og generelle indstillinger', add:false, save:true  },
  artikler:      { title:'Indsigter (Blog)', sub:'Tilføj og rediger dine artikler',               add:true, save:true  },
};

function renderSection(key) {
  const meta = sectionMeta[key];
  document.getElementById('topbarTitle').textContent = meta.title;
  document.getElementById('topbarSub').textContent   = meta.sub;
  document.getElementById('btnAdd').style.display    = meta.add ? 'block' : 'none';
  document.getElementById('btnSave').style.display   = meta.save ? 'block' : 'none';

  const area = document.getElementById('contentArea');
  const renderers = {
    forside:      renderForside,
    specialer:    renderSpecialer,
    projekter:    renderProjekter,
    artikler:     renderArtikler,
    ansaettelser: renderAnsaettelser,
    uddannelse:   renderUddannelse,
    anbefalinger: renderAnbefalinger,
    om:           renderOm,
    kontakt:      renderKontakt,
    site:         renderSite,
  };
  (renderers[key] || (() => area.innerHTML = '<div class="empty"><p>Sektion ikke fundet</p></div>'))(area);
}

/* ---- FORSIDE ---- */
function renderForside(area) {
  const h = data.hero || {};
  const b = data.bento || [];
  area.innerHTML = `
    <div style="max-width:720px;">
      <div class="hero-preview">
        <div class="hero-preview-label">Live preview</div>

function openForm(editIdx) {
  const isEdit = editIdx !== undefined;
  let item = {};
  if (isEdit) {
    if (currentSection === 'specialer')    item = (data.specialer || [])[editIdx] || {};
    else if (currentSection === 'projekter') item = (data.projects || [])[editIdx] || {};
    else if (currentSection === 'ansaettelser') item = (data.cv?.jobs || [])[editIdx] || {};
    else if (currentSection === 'uddannelse')   item = (data.cv?.education || [])[editIdx] || {};
    else if (currentSection === 'anbefalinger') item = (data.cv?.recommendations || [])[editIdx] || {};
    else if (currentSection === 'artikler')     item = (data.articles || [])[editIdx] || {};
  }
  
  if (currentSection === 'specialer') openSpecialForm(isEdit, editIdx, item);
  else if (currentSection === 'projekter') openProjectForm(isEdit, editIdx, item);
  else if (currentSection === 'ansaettelser') openJobForm(isEdit, editIdx, item);
  else if (currentSection === 'uddannelse') openEduForm(isEdit, editIdx, item);
  else if (currentSection === 'anbefalinger') openRecForm(isEdit, editIdx, item);
  else if (currentSection === 'artikler') openArticleForm(isEdit, editIdx, item);
}

/* ---- IMAGE UPLOAD ---- */
function createUploadZone(id, folder, currentPath='') {
  return `
    <div class="upload-zone" id="zone-${id}"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleDrop(event,'${id}','${folder}')">
      <input type="file" accept="image/*" onchange="handleFileSelect(this,'${id}','${folder}')">
      <div class="upload-zone-icon">📷</div>
      <div class="upload-zone-text">Klik eller træk et billede hertil</div>
      <div class="upload-zone-hint">JPG, PNG, WebP · Maks 10MB</div>
    </div>
    <div class="upload-progress" id="prog-${id}">
      <div class="upload-progress-bar" id="progbar-${id}"></div>
    </div>
    <div class="upload-error" id="err-${id}"></div>
    <div class="upload-preview ${currentPath?'show':''}" id="prev-${id}">
      ${currentPath ? `<img src="${currentPath}" style="object-position: center;">` : '<img style="display:none">'}
      <div style="flex:1;">
        <div class="upload-preview-name" id="prevname-${id}">${currentPath ? currentPath.split('/').pop() : ''}</div>
        <div class="upload-preview-path" id="prevpath-${id}">${currentPath}</div>
      </div>
      <button class="upload-preview-clear" onclick="clearUpload('${id}','${folder}')">✕</button>
    </div>
    <input type="hidden" id="imgpath-${id}" value="${currentPath}">`;
}

function handleDrop(e, id, folder) {
  e.preventDefault();
  document.getElementById('zone-' + id).classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) uploadImage(file, id, folder);
}

function handleFileSelect(input, id, folder) {
  const file = input.files[0];
  if (file) uploadImage(file, id, folder);
}

function uploadImage(file, id, folder) {
  const prog    = document.getElementById('prog-' + id);
  const progbar = document.getElementById('progbar-' + id);
  const errEl   = document.getElementById('err-' + id);
  const prev    = document.getElementById('prev-' + id);

  // Reset
  errEl.style.display = 'none';
  prog.style.display  = 'block';
  progbar.style.width = '0%';

  // Animate progress (XHR doesn't support progress on Simply shared hosting easily)
  let fakeProgress = 0;
  const interval = setInterval(() => {
    fakeProgress = Math.min(fakeProgress + Math.random() * 20, 85);
    progbar.style.width = fakeProgress + '%';
  }, 200);

  const formData = new FormData();
  formData.append('image', file);
  formData.append('folder', folder);

  fetch('api/upload.php', {
    method: 'POST',
    credentials: 'same-origin',
    body: formData
  })
  .then(r => r.json())
  .then(res => {
    clearInterval(interval);
    progbar.style.width = '100%';
    setTimeout(() => { prog.style.display = 'none'; progbar.style.width = '0%'; }, 600);

    if (res.ok) {
      // Update hidden input with path
      document.getElementById('imgpath-' + id).value = res.path;
      // Show preview
      const img = prev.querySelector('img');
      img.src = res.path;
      img.style.display = 'block';
      document.getElementById('prevname-' + id).textContent = res.name;
      document.getElementById('prevpath-' + id).textContent = res.path;
      prev.classList.add('show');

      // Opdater også fokus-pickerens billede hvis den findes
      const focusImg = document.getElementById('focus-img-' + id + '-pos');
      if (focusImg) focusImg.src = res.path;

      showToast('Billede uploadet: ' + res.name);
    } else {
      errEl.textContent = res.error || 'Upload fejlede';
      errEl.style.display = 'block';
      showToast(res.error || 'Upload fejlede', true);
    }
  })
  .catch(() => {
    clearInterval(interval);
    prog.style.display = 'none';
    errEl.textContent = 'Serverfejl under upload';
    errEl.style.display = 'block';
    showToast('Upload fejlede', true);
  });
}

function clearUpload(id) {
  document.getElementById('imgpath-' + id).value = '';
  document.getElementById('prev-' + id).classList.remove('show');
  document.getElementById('err-' + id).style.display = 'none';
}

function getUploadPath(id, fallback='') {
  const el = document.getElementById('imgpath-' + id);
  // Hvis elementet findes i DOM'en, stoler vi på dets værdi (også hvis den er tom)
  return el ? el.value : fallback;
}

/* ---- PDF / FIL UPLOAD ---- */
function createFileZone(id, currentPath='') {
  const filename = currentPath ? currentPath.split('/').pop() : '';
  return `
    <div class="upload-zone" id="zone-${id}"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleFileDrop(event,'${id}')">
      <input type="file" accept=".pdf,application/pdf" onchange="handleFileSelect2(this,'${id}')">
      <div class="upload-zone-icon">📄</div>
      <div class="upload-zone-text">Klik eller træk en PDF hertil</div>
      <div class="upload-zone-hint">PDF · Maks 20MB</div>
    </div>
    <div class="upload-progress" id="prog-${id}">
      <div class="upload-progress-bar" id="progbar-${id}"></div>
    </div>
    <div class="upload-error" id="err-${id}"></div>
    <div class="upload-preview ${currentPath?'show':''}" id="prev-${id}">
      <div style="font-size:22px;flex-shrink:0;">📄</div>
      <div style="flex:1;">
        <div class="upload-preview-name" id="prevname-${id}">${filename}</div>
        <div class="upload-preview-path" id="prevpath-${id}">${currentPath}</div>
      </div>
      <button class="upload-preview-clear" onclick="clearUpload('${id}')">✕</button>
    </div>
    <input type="hidden" id="imgpath-${id}" value="${currentPath}">`;
}

function handleFileDrop(e, id) {
  e.preventDefault();
  document.getElementById('zone-' + id).classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file, id);
}

function handleFileSelect2(input, id) {
  const file = input.files[0];
  if (file) uploadFile(file, id);
}

function uploadFile(file, id) {
  const prog    = document.getElementById('prog-' + id);
  const progbar = document.getElementById('progbar-' + id);
  const errEl   = document.getElementById('err-' + id);
  const prev    = document.getElementById('prev-' + id);

  errEl.style.display = 'none';
  prog.style.display  = 'block';
  progbar.style.width = '0%';

  let fakeProgress = 0;
  const interval = setInterval(() => {
    fakeProgress = Math.min(fakeProgress + Math.random() * 15, 85);
    progbar.style.width = fakeProgress + '%';
  }, 250);

   const formData = new FormData();
   formData.append('file', file);
   formData.append('folder', 'docs');
   formData.append('mode', 'file');

  fetch('api/upload.php', {
    method: 'POST',
    credentials: 'same-origin',
    body: formData
  })
  .then(r => r.json())
  .then(res => {
    clearInterval(interval);
    progbar.style.width = '100%';
    setTimeout(() => { prog.style.display = 'none'; progbar.style.width = '0%'; }, 600);

    if (res.ok) {
      document.getElementById('imgpath-' + id).value = res.path;
      document.getElementById('prevname-' + id).textContent = res.name;
      document.getElementById('prevpath-' + id).textContent = res.path;
      prev.classList.add('show');
      showToast('PDF uploadet: ' + res.name);
    } else {
      errEl.textContent = res.error || 'Upload fejlede';
      errEl.style.display = 'block';
      showToast(res.error || 'Upload fejlede', true);
    }
  })
  .catch(() => {
    clearInterval(interval);
    prog.style.display = 'none';
    errEl.textContent = 'Serverfejl under upload';
    errEl.style.display = 'block';
    showToast('Upload fejlede', true);
  });
}

/* ---- UTILS ---- */
function slug(str) { return str.toLowerCase().replace(/[æ]/g,'ae').replace(/[ø]/g,'oe').replace(/[å]/g,'aa').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function createPositionSelector(id, val='50% 50%', imgUrl='') {
  if (val === 'center center') val = '50% 50%';
  if (val === 'center top')    val = '50% 0%';
  if (val === 'center bottom') val = '50% 100%';
  if (val === 'left center')   val = '0% 50%';
  if (val === 'right center')  val = '100% 50%';

  const [x, y] = val.split(' ');
  // Hvis ingen imgUrl er givet, så prøv at slå det op (fallback for ældre kald)
  const currentImg = imgUrl || '';

  return `
    <div class="focus-picker-wrap">
      <label class="focus-picker-label">Billedfokus (klik på billedet)</label>
      <div class="focus-picker-container" onclick="setFocusPoint(event, '${id}')">
        <img src="${currentImg}" class="focus-picker-img" id="focus-img-${id}" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22112%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23222%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20fill%3D%22%23444%22%20font-family%3D%22sans-serif%22%20font-size%3D%2210%22%20text-anchor%3D%22middle%22%3EIngen%20billede%3C%2Ftext%3E%3C%2Fsvg%3E'">
        <div class="focus-picker-dot" id="focus-dot-${id}" style="left:${x}; top:${y};"></div>
      </div>
      <input type="hidden" id="${id}" value="${val}">
    </div>`;
}

function setFocusPoint(e, id) {
  const container = e.currentTarget;
  const rect = container.getBoundingClientRect();
  const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  const y = Math.round(((e.clientY - rect.top) / rect.height) * 100);
  const val = `${x}% ${y}%`;
  
  document.getElementById(id).value = val;
  const dot = document.getElementById('focus-dot-' + id);
  dot.style.left = x + '%';
  dot.style.top = y + '%';

  // Live preview på selve upload-previewet
  const previewId = id.replace('-pos', '');
  const previewImg = document.querySelector('#prev-' + previewId + ' img');
  if (previewImg) previewImg.style.objectPosition = val;
}
function emptyState(icon, title, text) { return `<div class="empty"><div class="empty-icon">${icon}</div><h3>${title}</h3><p>${text}</p></div>`; }

/* ---- LINK EDITOR ---- */
function createLinkEditor(links = []) {
  const list = links && Array.isArray(links) ? links : [];
  return `
    <div class="field" style="margin-top:16px;">
      <label class="field-label">Outbound Links (SEO)</label>
      <div id="linkList" class="link-editor-list">
        ${list.map((l, i) => `
          <div class="link-row" style="display:flex; gap:8px; margin-bottom:8px;">
            <input type="text" class="f-input" placeholder="Label (f.eks. Se live)" value="${esc(l.label)}" style="flex:1;">
            <input type="text" class="f-input" placeholder="URL (https://...)" value="${esc(l.url)}" style="flex:2;">
            <button class="btn-del" onclick="this.parentElement.remove()" style="padding:0 10px;">✕</button>
          </div>
        `).join('')}
      </div>
      <button type="button" class="btn-edit" style="font-size:11px; padding:6px 12px; margin-top:4px;" onclick="addLinkRow()">+ Tilføj link</button>
    </div>`;
}

function addLinkRow() {
  const container = document.getElementById('linkList');
  if (!container) return;
  const row = document.createElement('div');
  row.className = 'link-row';
  row.style.cssText = 'display:flex; gap:8px; margin-bottom:8px;';
  row.innerHTML = `
    <input type="text" class="f-input" placeholder="Label (f.eks. Se live)" style="flex:1;">
    <input type="text" class="f-input" placeholder="URL (https://...)" style="flex:2;">
    <button class="btn-del" onclick="this.parentElement.remove()" style="padding:0 10px;">✕</button>
  `;
  container.appendChild(row);
}

function getLinksFromEditor() {
  const rows = document.querySelectorAll('.link-row');
  const links = [];
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const label = inputs[0].value.trim();
    const url = inputs[1].value.trim();
    if (label && url) links.push({ label, url });
  });
  return links;
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show' + (isError?' error':'');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ---- ARTIKLER ---- */
function renderArtikler(area) {
  const list = data.articles || [];
  area.innerHTML = list.length ? `<div class="entry-grid">${list.map((a,i) => `
    <div class="entry-card">
      <div class="entry-card-header">
        <span class="entry-card-tag ${a.visible===false?'draft':''}">${a.date||'Ingen dato'}</span>
        ${a.reading_time ? `<span class="entry-card-tag" style="border-color:var(--blue);color:var(--blue);margin-left:6px;">${a.reading_time} min.</span>` : '<span class="entry-card-tag" style="margin-left:6px; opacity:0.5;">Auto</span>'}
        ${a.visible===false?'<span class="entry-card-tag draft" style="border-color:var(--amber);color:var(--amber);margin-left:6px;">Udkast</span>':''}
        <div class="entry-card-actions">
          <button class="btn-edit" onclick="editArticle(${i})">Rediger</button>
          <button class="btn-del"  onclick="deleteEntry('artikler',${i})">Slet</button>
        </div>
      </div>
      <div class="entry-card-title">${a.title}</div>
      <div class="entry-card-desc">${a.excerpt||''}</div>
    </div>`).join('')}</div>`
  : emptyState('📝','Ingen artikler endnu','Skriv dit første indlæg her.');
}

function editArticle(i) { openArticleForm(true, i, data.articles[i]); }
function openArticleForm(isEdit, idx, item={}) {
  const isVis = item.visible !== false;
  document.getElementById('formBody').innerHTML = `
    <div class="form-layout">
      <div class="form-main">
        <div class="field"><label class="field-label">Titel</label><input class="f-input" id="ar-title" value="${item.title||''}"></div>
        <div class="field"><label class="field-label">Dato</label><input class="f-input" id="ar-date" placeholder="F.eks. 12. maj 2026" value="${item.date||''}"></div>
        <div class="field"><label class="field-label">Kort resumé (Uddrag)</label><textarea class="f-textarea" id="ar-excerpt" style="height:60px;">${item.excerpt||''}</textarea></div>
        <div class="field">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label class="field-label" style="margin-bottom:0;">Artikel Indhold</label>
            <button type="button" class="btn-ai" onclick="optimizeWithAI('article')">✨ Optimér med AI</button>
          </div>
          <div id="quillEditor" style="height:300px;"></div>
        </div>
      </div>
      <div class="form-sidebar">
        <div class="field"><label class="field-label">Status</label>
          <select class="f-select" id="ar-vis">
            <option value="1" ${isVis?'selected':''}>Udgivet (Live)</option>
            <option value="0" ${!isVis?'selected':''}>Skjult (Udkast)</option>
          </select>
        </div>
        <div class="field"><label class="field-label">Læsetid (minutter)</label>
          <input class="f-input" type="number" id="ar-reading-time" value="${item.reading_time||''}" placeholder="Auto">
          <div class="field-hint">Lad stå tom for automatisk beregning</div>
        </div>
        <div class="field"><label class="field-label">Cover-billede</label>${createUploadZone('ar-cover','articles',item.cover||'')}</div>
        ${createPositionSelector('ar-cover-pos', item.cover_pos)}
        <div class="field"><label class="field-label">Billede Alt-tekst</label><input class="f-input" id="ar-cover-alt" value="${item.cover_alt||''}"></div>
      </div>
    </div>`;
  
  openFormPanel(isEdit ? 'Rediger artikel' : 'Tilføj artikel', () => {
    const title = document.getElementById('ar-title').value.trim();
    if(!title) { showToast('Giv venligst artiklen en titel', true); return; }
    const bodyContent = getEditorContent();
    const obj = {
      id: item.id || slug(title),
      title: title,
      date: document.getElementById('ar-date').value.trim(),
      excerpt: document.getElementById('ar-excerpt').value.trim(),
      cover: getUploadPath('ar-cover', item.cover),
      cover_pos: document.getElementById('ar-cover-pos').value,
      cover_alt: document.getElementById('ar-cover-alt').value,
      reading_time: document.getElementById('ar-reading-time').value.trim() || undefined,
      body: bodyContent,
      visible: document.getElementById('ar-vis').value === "1"
    };
    if(!data.articles) data.articles = [];
    if(isEdit) data.articles[idx] = obj;
    else data.articles.push(obj);
    closeForm(); updateBadges(); renderSection('artikler'); showToast(isEdit ? 'Artikel opdateret' : 'Artikel tilføjet');
  });
  initQuill('#quillEditor', item.body || '');
}

</script>
