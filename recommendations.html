<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anbefalinger — Zacharias Polonius</title>
  <meta name="description" content="Anbefalinger og udtalelser fra kolleger, ledere og samarbejdspartnere.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-hero {
      padding: 52px 40px 44px;
      border-bottom: 0.5px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: flex-end;
      gap: 32px;
    }
    .page-hero-label {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--blue); margin-bottom: 14px;
    }
    .page-hero-title {
      font-size: 44px; font-weight: 700; letter-spacing: -0.04em;
      color: var(--text); line-height: 1.0; margin-bottom: 14px;
    }
    .page-hero-desc {
      font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 480px;
    }
    .page-hero-stat { text-align: right; }
    .page-hero-stat-num { font-size: 36px; font-weight: 700; color: var(--blue); letter-spacing: -0.03em; }
    .page-hero-stat-lbl { font-size: 11px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    /* RECOMMENDATIONS GRID */
    .rec-grid { display: grid; grid-template-columns: repeat(2, 1fr); }
    .rec-card {
      padding: 40px; border-right: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      display: flex; flex-direction: column;
    }
    .rec-card:nth-child(2n) { border-right: none; }
    .rec-mark { font-size: 32px; color: var(--blue); font-weight: 700; line-height: 1; margin-bottom: 16px; }
    .rec-text { font-size: 15px; color: var(--text-muted); line-height: 1.8; font-style: italic; margin-bottom: 24px; flex: 1; }
    
    .rec-skills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 20px; border-top: 0.5px solid var(--border); padding-top: 16px; }
    .rec-skill { font-size: 9px; letter-spacing: 0.06em; padding: 3px 7px; border: 0.5px solid var(--border); color: var(--text-faint); text-transform: uppercase; }

    @media (max-width: 768px) {
      .rec-grid { grid-template-columns: 1fr; }
      .rec-card:nth-child(n) { border-right: none; }
      .rec-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <!-- SHARED HEADER -->
  <header id="global-header"></header>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="fade-up fade-up-1">
      <div class="page-hero-label">Udtalelser</div>
      <h1 class="page-hero-title">Hvad andre<br>siger</h1>
      <p class="page-hero-desc">Et indblik i mine professionelle relationer og de resultater, jeg har skabt sammen med mine kolleger og ledere.</p>
    </div>
    <div class="page-hero-stat fade-up fade-up-2">
      <div class="page-hero-stat-num" id="recCount">—</div>
      <div class="page-hero-stat-lbl">Anbefalinger</div>
    </div>
  </div>

  <!-- RECOMMENDATIONS GRID -->
  <div class="rec-grid" id="recGrid">
    <!-- Rendered by JS -->
  </div>

  <!-- CENTRAL CTA BAR -->
  <div id="global-cta-bar"></div>

  <!-- SHARED FOOTER -->
  <footer id="global-footer" class="footer"></footer>

  <!-- SHARED WIDGETS -->
  <div id="global-contact"></div>
  <nav id="global-bottom-nav"></nav>
  <div id="global-floating-cta"></div>

  <script src="js/main.js?v=1.0.3"></script>
  <script>
    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    function stripHtml(html) {
      if (!html) return '';
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || div.innerText || "";
    }

    fetch('data/content.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const s = data.site || {};
        const recs = (data.cv?.recommendations || []).filter(r => r.visible !== false);
        
        // Count
        document.getElementById('recCount').textContent = recs.length;

        // Recommendations
        const grid = document.getElementById('recGrid');
        recs.forEach(r => {
          const raw = r.intro || stripHtml(r.text || '');
          const words = raw.trim().split(/\s+/);
          const truncated = words.length > 150 ? words.slice(0, 150).join(' ') + '...' : raw;
          grid.innerHTML += `
            <div class="rec-card">
              <div class="rec-mark">"</div>
              <p class="rec-text">${esc(truncated)}</p>
              <div class="rec-author-wrap">
                ${r.photo ? `<img src="${r.photo}" alt="${esc(r.photo_alt||r.name)}" class="rec-avatar" style="object-position: ${r.photo_pos || 'center center'}" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23555%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M20%2021v-2a4%204%200%200%200-4-4H8a4%204%200%200%200-4%204v2%22%3E%3C%2Fpath%3E%3Ccircle%20cx%3D%2212%22%20cy%3D%227%22%20r%3D%224%22%3E%3C%2Fcircle%3E%3C%2Fsvg%3E'">` : ''}
                <div class="rec-meta">
                  <div class="rec-name">${esc(r.name)}</div>
                  <div class="rec-role">${esc(r.role)}</div>
                </div>
              </div>
              <a href="detail.html?id=${r.id}" class="section-link" style="margin-top:20px; display:inline-block; font-size:12px;">Læs hele udtalelsen →</a>
              ${(r.skills||[]).length ? `<div class="rec-skills">${r.skills.map(s=>`<span class="rec-skill">${esc(s)}</span>`).join('')}</div>` : ''}
            </div>`;
        });
      });
  </script>
</body>
</html>
